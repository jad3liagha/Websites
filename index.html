<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>النظام السحابي الموحد | Cyber Deep Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* الهوية البصرية السيبرانية المتوهجة */
        :root {
            --bg-gradient: linear-gradient(135deg, #050a21, #0c153a, #162252);
            --card-bg: rgba(12, 21, 58, 0.45);
            --glass-border: rgba(41, 74, 122, 0.35);
            --accent-teal: #24b2a3;
            --accent-glow: rgba(36, 178, 163, 0.3);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --transition-epic: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            box-sizing: border-box;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--accent-teal);
            border-radius: 50%;
            top: 10%;
            left: 15%;
            filter: blur(180px);
            opacity: 0.12;
            z-index: 0;
            pointer-events: none;
        }

        /* إصلاح المشكلة: الشاشات مخفية افتراضياً عدا شاشة الدخول */
        .screen { width: 100%; z-index: 1; }
        #appScreen { display: none; } /* لوحة التحكم مخفية حتى ينجح الدخول */
        #authScreen { display: block; } /* واجهة الدخول تظهر فوراً لتجنب الشاشة السوداء */

        /* ================= واجهة تسجيل الدخول والإنشاء ================= */
        .auth-wrapper {
            width: 100%; max-width: 440px; margin: 40px auto; padding: 0 20px; box-sizing: border-box;
        }
        .auth-card {
            background: var(--card-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-radius: 32px; padding: 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 0 0 50px rgba(36, 178, 163, 0.05);
            transition: var(--transition-epic);
        }
        .auth-card:hover {
            border-color: rgba(36, 178, 163, 0.5);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), 0 0 60px rgba(36, 178, 163, 0.15);
        }
        .auth-tabs {
            display: flex; background: rgba(5, 10, 33, 0.6); padding: 6px; border-radius: 16px; margin-bottom: 35px; border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .tab-btn {
            flex: 1; background: none; border: none; color: var(--text-muted);
            padding: 12px; font-family: 'Cairo', sans-serif; font-size: 1rem;
            font-weight: 700; cursor: pointer; border-radius: 12px; transition: var(--transition-epic);
        }
        .tab-btn.active { background: var(--accent-teal); color: #050a21; box-shadow: 0 8px 20px var(--accent-glow); }
        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-header h2 {
            margin: 0; font-size: 1.8rem; font-weight: 800;
            background: linear-gradient(to left, #fff, #93c5fd, var(--accent-teal));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .auth-header p { color: var(--text-muted); font-size: 0.85rem; margin: 8px 0 0 0; }
        
        .form-group { position: relative; margin-bottom: 22px; }
        .form-group label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 8px; }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        
        .form-group input, .form-group textarea {
            width: 100%; padding: 14px 16px; background: rgba(5, 10, 33, 0.4);
            border: 1px solid var(--glass-border); border-radius: 14px; color: white;
            font-family: 'Cairo', sans-serif; font-size: 0.95rem; box-sizing: border-box; transition: var(--transition-epic);
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none; border-color: var(--accent-teal); background: rgba(5, 10, 33, 0.7);
            box-shadow: 0 0 20px rgba(36, 178, 163, 0.25);
        }
        
        .toggle-password { position: absolute; left: 16px; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; }
        
        .btn-cyber {
            width: 100%; padding: 15px; background: var(--accent-teal); color: #050a21;
            border: none; border-radius: 14px; font-size: 1rem; font-weight: 800;
            font-family: 'Cairo', sans-serif; cursor: pointer; transition: var(--transition-epic);
            box-shadow: 0 8px 25px var(--accent-glow);
        }
        .btn-cyber:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(36, 178, 163, 0.5); }
        .btn-cyber:disabled { background: #4b5563; color: #9ca3af; cursor: not-allowed; box-shadow: none; }
        
        .auth-form { display: none; opacity: 0; transform: translateY(15px); transition: opacity 0.4s ease, transform 0.4s ease; }
        .auth-form.active { display: block; opacity: 1; transform: translateY(0); }

        /* ================= لوحة التحكم الرئيسية ================= */
        .dashboard-wrapper { width: 100%; max-width: 1200px; padding: 40px 20px 120px 20px; box-sizing: border-box; }
        .dash-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;
            background: var(--card-bg); padding: 15px 30px; border-radius: 20px; border: 1px solid var(--glass-border);
        }
        .dash-header h1 {
            margin: 0; font-size: 1.6rem; font-weight: 800;
            background: linear-gradient(to left, #fff, var(--accent-teal));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .logout-btn {
            background: rgba(220, 38, 38, 0.2); border: 1px solid rgba(220, 38, 38, 0.4);
            color: #fca5a5; padding: 8px 18px; border-radius: 12px; font-family: 'Cairo', sans-serif;
            font-weight: 600; cursor: pointer; transition: var(--transition-epic);
        }
        .logout-btn:hover { background: #dc2626; color: white; }
        
        .search-container { width: 100%; max-width: 500px; margin: 0 auto 40px auto; }
        .search-input {
            width: 100%; padding: 14px 24px; background: rgba(12, 21, 58, 0.6);
            border: 1px solid var(--glass-border); border-radius: 50px; color: white;
            font-family: 'Cairo', sans-serif; text-align: center; transition: var(--transition-epic);
        }
        .search-input:focus { outline: none; border-color: var(--accent-teal); box-shadow: 0 0 20px rgba(36, 178, 163, 0.35); }

        .links-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; width: 100%; }
        .link-card {
            background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 24px; padding: 25px;
            display: flex; flex-direction: column; align-items: center; position: relative;
            transition: var(--transition-epic); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4); user-select: none;
        }
        .link-card:hover { transform: translateY(-5px); border-color: var(--accent-teal); box-shadow: 0 15px 35px rgba(36, 178, 163, 0.2); }
        .link-card.dragging { opacity: 0.2; border: 2px dashed var(--accent-teal); }
        
        .drag-handle { position: absolute; top: 22px; right: 20px; display: flex; flex-direction: column; gap: 5px; width: 22px; cursor: grab; padding: 5px; }
        .drag-line { height: 2px; background: rgba(255, 255, 255, 0.25); border-radius: 2px; }
        
        .link-img { width: 80px; height: 80px; border-radius: 20px; object-fit: cover; margin-bottom: 15px; border: 2px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.4); margin-top: 10px; }
        .link-name { font-size: 1.2rem; font-weight: 700; color: #fff; margin-bottom: 8px; }
        .link-notes { font-size: 0.85rem; color: var(--text-muted); text-align: center; }
        
        .card-actions { position: absolute; top: 15px; left: 15px; display: flex; gap: 8px; }
        .action-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.05); color: #fff; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-edit:hover { background: #2563eb; }
        .btn-delete:hover { background: #dc2626; }

        .fab-btn {
            position: fixed; bottom: 35px; left: 35px; background: var(--accent-teal); color: #050a21;
            border: none; width: 60px; height: 60px; border-radius: 50%; font-size: 1.8rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 10px 30px rgba(36, 178, 163, 0.4); display: flex; align-items: center; justify-content: center; z-index: 99;
            transition: var(--transition-epic);
        }
        .fab-btn:hover { transform: scale(1.1) rotate(90deg); }

        /* نافذة الإضافة */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 10, 33, 0.8); backdrop-filter: blur(12px); z-index: 1000;
            justify-content: center; align-items: center; opacity: 0; transition: opacity 0.3s ease;
        }
        .modal.show { opacity: 1; }
        .modal-content { background: #0c153a; border: 1px solid var(--glass-border); padding: 35px; border-radius: 28px; width: 90%; max-width: 460px; }
        .modal-header { font-size: 1.3rem; font-weight: 700; margin-bottom: 25px; display: flex; justify-content: space-between; }
        .close-modal { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.4rem; }
    </style>
</head>
<body>

    <!-- واجهة تسجيل الدخول والإنشاء تظهر مباشرة الآن -->
    <div id="authScreen" class="screen">
        <div class="auth-wrapper">
            <div class="auth-card">
                <div class="auth-tabs">
                    <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">تسجيل الدخول</button>
                    <button class="tab-btn" id="tabRegister" onclick="switchTab('register')">حساب جديد</button>
                </div>

                <div id="loginFormContainer" class="auth-form active">
                    <div class="auth-header">
                        <h2>مرحباً بك مجدداً ⚡</h2>
                        <p>سجل دخولك لمزامنة مواجهتك وحساباتك سحابياً</p>
                    </div>
                    <form id="loginForm">
                        <div class="form-group">
                            <label>البريد الإلكتروني:</label>
                            <input type="email" id="loginEmail" required placeholder="name@example.com">
                        </div>
                        <div class="form-group">
                            <label>كلمة المرور:</label>
                            <div class="input-wrapper">
                                <input type="password" id="loginPassword" required placeholder="••••••••">
                                <button type="button" class="toggle-password" onclick="togglePasswordVisibility('loginPassword')">👁️</button>
                            </div>
                        </div>
                        <button type="submit" class="btn-cyber" id="loginBtn">تأكيد الهوية والدخول 🚀</button>
                    </form>
                </div>

                <div id="registerFormContainer" class="auth-form">
                    <div class="auth-header">
                        <h2>إنشاء نظام حساب جديد 🛡️</h2>
                        <p>احصل على مساحة مشفرة خاصة بك لحفظ مواقعك</p>
                    </div>
                    <form id="registerForm">
                        <div class="form-group">
                            <label>الاسم الكامل / المستعار:</label>
                            <input type="text" id="regName" required placeholder="المطور المحترف">
                        </div>
                        <div class="form-group">
                            <label>البريد الإلكتروني:</label>
                            <input type="email" id="regEmail" required placeholder="cyber@space.com">
                        </div>
                        <div class="form-group">
                            <label>إنشاء كلمة مرور قوية:</label>
                            <div class="input-wrapper">
                                <input type="password" id="regPassword" required placeholder="••••••••">
                                <button type="button" class="toggle-password" onclick="togglePasswordVisibility('regPassword')">👁️</button>
                            </div>
                        </div>
                        <button type="submit" class="btn-cyber" id="regBtn">تأسيس الحساب السحابي ✨</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- لوحة التحكم الرئيسية -->
    <div id="appScreen" class="screen">
        <div class="dashboard-wrapper">
            <div class="dash-header">
                <div>
                    <h1 id="welcomeMessage">لوحة الحسابات الاحترافية</h1>
                    <span id="userEmailDisplay" style="font-size:0.8rem; color: var(--accent-teal);"></span>
                </div>
                <button class="logout-btn" onclick="handleLogout()">تسجيل الخروج 🚪</button>
            </div>

            <div class="search-container">
                <input type="text" id="searchBar" class="search-input" placeholder="🔍 ابحث في حساباتك ومواقعك المضافة..." oninput="filterLinks()">
            </div>

            <div class="links-grid" id="linksGrid"></div>
        </div>
        <button class="fab-btn" onclick="openModal()">+</button>
    </div>

    <!-- نافذة الإضافة والتعديل -->
    <div class="modal" id="linkModal">
        <div class="modal-content">
            <div class="modal-header">
                <span id="modalTitle">إضافة موقع جديد</span>
                <button class="close-modal" onclick="closeModal()">✕</button>
            </div>
            <form id="linkForm">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label>اسم الحساب / الموقع:</label>
                    <input type="text" id="siteName" required>
                </div>
                <div class="form-group">
                    <label>الرابط الكامل (URL):</label>
                    <input type="text" id="siteUrl" required placeholder="example.com">
                </div>
                <div class="form-group">
                    <label>رفع الصورة مباشرة من الهاتف 📱:</label>
                    <input type="file" id="siteImgFile" accept="image/*">
                </div>
                <div class="form-group">
                    <label>شرح أو ملاحظات سرية:</label>
                    <textarea id="siteNotes" rows="3"></textarea>
                </div>
                <button type="submit" class="btn-cyber" id="submitBtn">حفظ البيانات سحابياً ☁️</button>
            </form>
        </div>
    </div>

    <!-- سكريبت العمليات السحابية الكاملة والربط بـ Firestore -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDztcrgyigsgPCEdGiUe3aGmseMdynXceA",
            authDomain: "websites-89295.firebaseapp.com",
            projectId: "websites-89295",
            storageBucket: "websites-89295.firebasestorage.app",
            messagingSenderId: "4028317749",
            appId: "1:4028317749:web:53ba98ac1359df1171b17c",
            measurementId: "G-NJYBRZN3PB"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const storage = getStorage(app);
        const db = getFirestore(app);

        const authScreen = document.getElementById('authScreen');
        const appScreen = document.getElementById('appScreen');
        const linksGrid = document.getElementById('linksGrid');
        const linkForm = document.getElementById('linkForm');
        const linkModal = document.getElementById('linkModal');
        const modalTitle = document.getElementById('modalTitle');
        const submitBtn = document.getElementById('submitBtn');
        const editIdInput = document.getElementById('editId');

        const defaultImg = "https://cdn-icons-png.flaticon.com/512/1006/1006771.png";
        let currentUser = null;
        let savedLinks = [];

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('welcomeMessage').innerText = `لوحة الحسابات العائدة لـ ${user.displayName || 'البطل'} ✨`;
                document.getElementById('userEmailDisplay').innerText = user.email;
                
                // التبديل البرمجي الصحيح والمضمون للشاشات عند تسجيل الدخول
                authScreen.style.display = 'none';
                appScreen.style.display = 'block';
                
                try {
                    const docRef = doc(db, "user_websites", user.uid);
                    const docSnap = await getDoc(docRef);
                    if (docSnap.exists()) {
                        savedLinks = docSnap.data().links || [];
                    } else {
                        savedLinks = [];
                    }
                } catch (e) {
                    console.error("خطأ جلب البيانات السحابية: ", e);
                    savedLinks = JSON.parse(localStorage.getItem(`links_${user.uid}`)) || [];
                }
                displayLinks();
            } else {
                currentUser = null;
                appScreen.style.display = 'none';
                authScreen.style.display = 'block';
            }
        });

        async function syncDataToCloud() {
            if (!currentUser) return;
            localStorage.setItem(`links_${currentUser.uid}`, JSON.stringify(savedLinks));
            try {
                await setDoc(doc(db, "user_websites", currentUser.uid), { links: savedLinks });
            } catch (e) {
                console.error("خطأ المزامنة السحابية: ", e);
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');
            
            btn.innerText = "جاري الاتصال بالسحابة الآمنة... ⏳";
            btn.disabled = true;

            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (err) {
                alert("خطأ: تأكد من صحة الحساب وكلمة المرور أو تفعيل الـ VPN إذا لزم الأمر.");
                console.error(err);
            } finally {
                btn.innerText = "تأكيد الهوية والدخول 🚀";
                btn.disabled = false;
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const pass = document.getElementById('regPassword').value;
            const btn = document.getElementById('regBtn');

            btn.innerText = "جاري حجز مساحتك السحابية... ⏳";
            btn.disabled = true;

            try {
                const credential = await createUserWithEmailAndPassword(auth, email, pass);
                await updateProfile(credential.user, { displayName: name });
                window.location.reload();
            } catch (err) {
                alert("فشل التأسيس: الحساب مستخدم أو كلمة المرور قصيرة.");
                console.error(err);
            } finally {
                btn.innerText = "تأسيس الحساب السحابي ✨";
                btn.disabled = false;
            }
        });

        window.handleLogout = function() {
            if(confirm("هل أنت متأكد من رغبتك في تسجيل الخروج؟")) { signOut(auth); }
        }

        function displayLinks() {
            linksGrid.innerHTML = '';
            savedLinks.forEach((link) => {
                const card = document.createElement('div');
                card.className = 'link-card';
                card.setAttribute('data-id', link.id);
                card.setAttribute('draggable', 'true');

                card.innerHTML = `
                    <div class="drag-handle"><div class="drag-line"></div><div class="drag-line"></div></div>
                    <div class="card-actions">
                        <button type="button" class="action-btn btn-edit" onclick="setupEdit('${link.id}')">✏️</button>
                        <button type="button" class="action-btn btn-delete" onclick="deleteLink('${link.id}')">🗑️</button>
                    </div>
                    <div style="width:100%; display:flex; flex-direction:column; align-items:center; cursor:pointer;" onclick="window.open('${link.url}', '_blank')">
                        <img class="link-img" src="${link.img ? link.img : defaultImg}" onerror="this.onerror=null; this.src='${defaultImg}';">
                        <div class="link-name">${link.name}</div>
                        <div class="link-notes">${link.notes ? link.notes : 'لا توجد ملاحظات.'}</div>
                    </div>
                `;
                linksGrid.appendChild(card);
            });
        }

        linkForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            if(!currentUser) return;

            submitBtn.innerText = "جاري تشفير وحفظ الموقع سحابياً... ⏳";
            submitBtn.disabled = true;

            const name = document.getElementById('siteName').value.trim();
            let url = document.getElementById('siteUrl').value.trim();
            const notes = document.getElementById('siteNotes').value.trim();
            const editId = editIdInput.value;
            const fileInput = document.getElementById('siteImgFile');
            const file = fileInput.files[0];

            let imgUrl = defaultImg;

            if (editId !== "") {
                const currentLink = savedLinks.find(l => l.id === editId);
                if (currentLink) imgUrl = currentLink.img;
            }

            if (file) {
                try {
                    const storageRef = ref(storage, `users/${currentUser.uid}/logos/${Date.now()}_${file.name}`);
                    const snapshot = await uploadBytes(storageRef, file);
                    imgUrl = await getDownloadURL(snapshot.ref);
                } catch (error) {
                    console.error(error);
                    alert("فشل رفع الصورة السحابية، يرجى مراجعة قواعد Storage وباقي الحفظ مستمر.");
                }
            }

            if (!/^https?:\/\//i.test(url)) url = 'https://' + url;

            if (editId === "") {
                const newId = 'id_' + Math.random().toString(36).substr(2, 9);
                savedLinks.push({ id: newId, name, url, img: imgUrl, notes });
            } else {
                const index = savedLinks.findIndex(l => l.id === editId);
                if (index !== -1) savedLinks[index] = { id: editId, name, url, img: imgUrl, notes };
            }

            await syncDataToCloud();
            displayLinks();
            closeModal();
            submitBtn.disabled = false;
            submitBtn.innerText = "حفظ البيانات سحابياً ☁️";
        });

        window.openModal = function() {
            modalTitle.innerText = "إضافة موقع/حساب جديد";
            submitBtn.innerText = "حفظ الموقع سحابياً ☁️";
            editIdInput.value = "";
            linkForm.reset();
            linkModal.style.display = 'flex';
            setTimeout(() => linkModal.classList.add('show'), 10);
        }

        window.closeModal = function() {
            linkModal.classList.remove('show');
            setTimeout(() => linkModal.style.display = 'none', 300);
        }

        window.setupEdit = function(id) {
            const link = savedLinks.find(l => l.id === id);
            if (!link) return;
            modalTitle.innerText = "تعديل بيانات الحساب";
            submitBtn.innerText = "تحديث الحساب سحابياً 🔄";
            editIdInput.value = id;
            document.getElementById('siteName').value = link.name;
            document.getElementById('siteUrl').value = link.url;
            document.getElementById('siteImgFile').value = "";
            document.getElementById('siteNotes').value = link.notes;
            linkModal.style.display = 'flex';
            setTimeout(() => linkModal.classList.add('show'), 10);
        }

        window.deleteLink = async function(id) {
            if(confirm("هل تود حذف هذا الموقع سحابياً بشكل نهائي؟")) {
                savedLinks = savedLinks.filter(l => l.id !== id);
                await syncDataToCloud();
                displayLinks();
            }
        }

        window.filterLinks = function() {
            const query = document.getElementById('searchBar').value.toLowerCase().trim();
            const cards = document.querySelectorAll('.link-card');
            savedLinks.forEach((link, index) => {
                const card = cards[index];
                if (!card) return;
                card.style.display = (link.name.toLowerCase().includes(query) || (link.notes || '').toLowerCase().includes(query)) ? 'flex' : 'none';
            });
        }

        let activeDraggedItem = null;
        linksGrid.addEventListener('dragstart', (e) => {
            const card = e.target.closest('.link-card'); if (!card) return;
            activeDraggedItem = card; setTimeout(() => card.classList.add('dragging'), 0);
        });
        linksGrid.addEventListener('dragend', async () => {
            if (activeDraggedItem) activeDraggedItem.classList.remove('dragging'); activeDraggedItem = null;
            const currentDOMCards = Array.from(linksGrid.querySelectorAll('.link-card'));
            savedLinks = currentDOMCards.map(card => savedLinks.find(link => link.id === card.getAttribute('data-id'))).filter(Boolean);
            await syncDataToCloud();
        });
        linksGrid.addEventListener('dragover', (e) => {
            e.preventDefault(); const targetCard = e.target.closest('.link-card');
            if (!targetCard || targetCard === activeDraggedItem) return;
            const bounding = targetCard.getBoundingClientRect();
            if (e.clientY - bounding.top > bounding.height / 2) targetCard.after(activeDraggedItem); else targetCard.before(activeDraggedItem);
        });

        let touchItem = null;
        linksGrid.addEventListener('touchstart', (e) => {
            if (!e.target.closest('.drag-handle')) return;
            touchItem = e.target.closest('.link-card'); touchItem.classList.add('dragging');
        }, { passive: true });
        linksGrid.addEventListener('touchmove', (e) => {
            if (!touchItem) return; const touch = e.touches[0];
            const targetCard = document.elementFromPoint(touch.clientX, touch.clientY)?.closest('.link-card');
            if (targetCard && targetCard !== touchItem) {
                const bounding = targetCard.getBoundingClientRect();
                if (touch.clientY - bounding.top > bounding.height / 2) targetCard.after(touchItem); else targetCard.before(touchItem);
            }
        }, { passive: true });
        linksGrid.addEventListener('touchend', async () => {
            if (!touchItem) return; touchItem.classList.remove('dragging'); touchItem = null;
            const currentDOMCards = Array.from(linksGrid.querySelectorAll('.link-card'));
            savedLinks = currentDOMCards.map(card => savedLinks.find(link => link.id === card.getAttribute('data-id'))).filter(Boolean);
            await syncDataToCloud();
        });

        window.onclick = function(event) { if (event.target == linkModal) window.closeModal(); }
    </script>

    <script>
        function switchTab(type) {
            const tabLogin = document.getElementById('tabLogin'); const tabRegister = document.getElementById('tabRegister');
            const loginForm = document.getElementById('loginFormContainer'); const registerForm = document.getElementById('registerFormContainer');
            if (type === 'login') {
                tabLogin.classList.add('active'); tabRegister.classList.remove('active'); loginForm.style.display = 'block'; registerForm.style.display = 'none';
                setTimeout(() => { loginForm.classList.add('active'); registerForm.classList.remove('active'); }, 50);
            } else {
                tabRegister.classList.add('active'); tabLogin.classList.remove('active'); registerForm.style.display = 'block'; loginForm.style.display = 'none';
                setTimeout(() => { registerForm.classList.add('active'); loginForm.classList.remove('active'); }, 50);
            }
        }

        function togglePasswordVisibility(inputId) {
            const input = document.getElementById(inputId); const button = input.nextElementSibling;
            if (input.type === 'password') { input.type = 'text'; button.innerText = '🔒'; } else { input.type = 'password'; button.innerText = '👁️'; }
        }
    </script>
</body>
</html>
